name: Automatic Master's Thesis document compiler

on:
  push:
    branches:
      - main 

jobs:
  build_latex:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 1. Clone Repo
        uses: actions/checkout@v4

      - name: 2. Compile Document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: MasThesis_Document_Main.tex
          compiler: latexmk
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: 3. Save PDF in actions section
        uses: actions/upload-artifact@v4
        with:
          name: Thesis_Document_GH_Compiler
          path: MasThesis_Document_Main.pdf